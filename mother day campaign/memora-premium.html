<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Memora Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --gold:#d4af6a;
      --gold-d:rgba(212,175,106,0.55);
      --gold-g:rgba(212,175,106,0.12);
      --ink:#020817;
      --paper:#fff7ee;
      --paper2:#f3e7da;
      --shadow:rgba(0,0,0,0.32);
    }
    html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);-webkit-font-smoothing:antialiased;}

    /* ── SCREENS ── */
    .screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.9s ease;z-index:1;}
    .screen.active{opacity:1;pointer-events:all;z-index:2;}

    /* ── OVERLAY ── */
    #ov{position:fixed;inset:0;background:#020817;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.65s ease;}
    #ov.on{opacity:1;pointer-events:all;}

    /* ═══════════════ S1: NIGHT SKY ═══════════════ */
    #s1{background:#020817;}
    #c-stars{position:absolute;inset:0;}
    .sky-center{position:relative;z-index:10;text-align:center;color:#fff;}

    .logo-mark{
      font-family:'Raleway',sans-serif;font-size:11px;font-weight:200;
      letter-spacing:12px;text-transform:uppercase;color:var(--gold);
      margin-bottom:52px;opacity:0;animation:riseIn 1s ease 0.5s forwards;
    }

    .type-line{
      display:block;
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(30px,5.2vw,56px);
      font-weight:300;
      font-style:italic;
      color:#fff;
      line-height:1.35;
      min-height:1.35em;
      letter-spacing:0.01em;
      text-shadow:0 18px 60px rgba(0,0,0,0.55);
    }
    .type-line .caret{
      display:inline-block;width:1px;height:1em;margin-left:6px;transform:translateY(3px);
      background:rgba(255,255,255,0.75);
      animation:caretBlink 800ms steps(2,end) infinite;
    }
    @keyframes caretBlink{0%,49%{opacity:1}50%,100%{opacity:0}}

    .g-divider{
      width:1px;height:44px;
      background:linear-gradient(180deg,transparent,var(--gold),transparent);
      margin:34px auto;opacity:0;animation:fadeIn 1.2s ease 3.5s forwards;
    }

    .g-sub{
      font-family:'Raleway',sans-serif;font-size:11px;font-weight:300;
      letter-spacing:6px;color:rgba(212,175,106,0.6);text-transform:uppercase;
      opacity:0;animation:riseIn 1s ease 4s forwards;
    }

    .cta{
      margin-top:52px;display:inline-block;padding:15px 52px;
      border:1px solid var(--gold-d);background:transparent;color:var(--gold);
      font-family:'Raleway',sans-serif;font-size:10px;font-weight:300;
      letter-spacing:7px;text-transform:uppercase;cursor:pointer;
      opacity:0;animation:riseIn 1s ease 4.8s forwards;
      transition:background .4s,border-color .4s;
      touch-action:manipulation;
    }
    .cta:hover{background:var(--gold-g);border-color:var(--gold);}

    @keyframes riseIn{to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{to{opacity:1;}}

    /* ═══════════════ S2: ALBUM ═══════════════ */
    #s2{
      background:
        radial-gradient(ellipse at 50% 18%, rgba(255,255,255,0.92) 0%, rgba(255,240,222,0.80) 46%, rgba(232,216,196,0.72) 100%),
        radial-gradient(ellipse at 50% 65%, rgba(212,175,106,0.10) 0%, transparent 70%);
    }

    .album-scene{perspective:1400px;cursor:pointer;position:relative;}

    .book-3d{
      width:260px;height:368px;position:relative;
      transform-style:preserve-3d;
      animation:bkFloat 5s ease-in-out infinite;
      filter:drop-shadow(0 28px 70px rgba(25,16,10,0.22));
    }
    @keyframes bkFloat{
      0%,100%{transform:rotateX(6deg) rotateY(-18deg) translateY(0);}
      50%{transform:rotateX(4deg) rotateY(-13deg) translateY(-14px);}
    }

    /* Safari CSS 3D patch: prevent flicker */
    .book-3d,.book-3d *{
      -webkit-backface-visibility:hidden;
      backface-visibility:hidden;
      transform:translateZ(0);
      will-change:transform;
    }

    .book-face{
      position:absolute;width:260px;height:368px;
      border-radius:3px 16px 16px 3px;
      background:linear-gradient(155deg,#1e1040 0%,#2d1b62 40%,#180c36 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      overflow:hidden;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .book-face::before{
      content:'';position:absolute;inset:10px;
      border:1px solid rgba(212,175,106,0.22);border-radius:0 12px 12px 0;
    }
    .book-face::after{
      content:'';position:absolute;inset:16px;
      border:1px solid rgba(212,175,106,0.08);border-radius:0 8px 8px 0;
    }

    .book-spine{
      position:absolute;left:-17px;top:0;width:17px;height:368px;
      background:linear-gradient(90deg,#060415,#100830);
      border-radius:3px 0 0 3px;
      transform-origin:right center;transform:rotateY(-90deg);
    }

    .bk-ornament{position:absolute;opacity:0.07;width:190px;height:190px;}
    .bk-title{
      font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;
      font-style:italic;color:var(--gold);letter-spacing:3px;
      position:relative;z-index:1;text-align:center;
    }
    .bk-sub{
      font-family:'Raleway',sans-serif;font-size:9px;font-weight:200;
      letter-spacing:8px;color:var(--gold-d);text-transform:uppercase;
      margin-top:7px;position:relative;z-index:1;
    }
    .bk-pulse{
      position:absolute;bottom:24px;font-family:'Raleway',sans-serif;
      font-size:9px;letter-spacing:5px;color:var(--gold-d);
      animation:breathe 2s ease-in-out infinite;
    }
    @keyframes breathe{0%,100%{opacity:0.35;}50%{opacity:1;}}

    .bk-glow{
      position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);
      width:220px;height:42px;
      background:radial-gradient(ellipse,rgba(212,175,106,0.22) 0%,transparent 70%);
      filter:blur(16px);
    }
    .s2-caption{
      position:absolute;bottom:-58px;text-align:center;width:340px;
      font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;
      color:rgba(35,25,14,0.38);letter-spacing:3px;
    }

    /* ═══════════════ S3: READER ═══════════════ */
    #s3{overflow:hidden;}
    #bg-rd{position:absolute;inset:0;transition:background 1.8s ease;}
    #c-pt{position:absolute;inset:0;pointer-events:none;}

    .rd-root{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;}
    .sn-hdr{
      font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;
      letter-spacing:9px;text-align:center;margin-bottom:20px;
      transition:color 1.8s ease;opacity:0.9;
      text-shadow:0 16px 46px rgba(0,0,0,0.18);
    }

    /* SPREAD */
    .spread{width:540px;height:372px;position:relative;perspective:1800px;}
    .spread::before{
      content:'';position:absolute;left:50%;top:0;transform:translateX(-50%);
      width:10px;height:100%;
      background:linear-gradient(90deg,rgba(0,0,0,0.05),rgba(0,0,0,0.14),rgba(0,0,0,0.05));
      z-index:5;
    }

    .pg-l,.pg-r{position:absolute;top:0;width:265px;height:372px;overflow:hidden;}
    .pg-l{
      left:0;background:#faf7f1;
      border-radius:3px 0 0 3px;border-right:1px solid #e2d9c4;
      box-shadow:inset -8px 0 20px rgba(0,0,0,0.07);
    }
    .pg-r{
      right:0;background:#f5f0e5;
      border-radius:0 3px 3px 0;border-left:1px solid #e2d9c4;
      box-shadow:inset 8px 0 20px rgba(0,0,0,0.04);
    }

    /* FLIP */
    .flip{
      position:absolute;right:0;top:0;width:265px;height:372px;
      transform-origin:left center;transform-style:preserve-3d;
      transition:transform 1.35s cubic-bezier(0.77,0,0.18,1);
      z-index:10;cursor:pointer;
    }
    .flip.open{transform:rotateY(-180deg);}

    /* Safari CSS 3D patch: prevent flicker in the reader */
    .spread,.spread *,.flip,.flip *{
      -webkit-backface-visibility:hidden;
      backface-visibility:hidden;
      transform:translateZ(0);
      will-change:transform;
    }

    .flip-f,.flip-b{
      position:absolute;inset:0;overflow:hidden;
      backface-visibility:hidden;-webkit-backface-visibility:hidden;
    }
    .flip-f{
      background:#f5f0e5;border-radius:0 3px 3px 0;
      border-left:1px solid #e2d9c4;
    }
    .flip-b{
      background:#faf7f1;border-radius:3px 0 0 3px;
      border-right:1px solid #e2d9c4;
      transform:rotateY(180deg);
    }

    /* PAGE CONTENT */
    .pi{
      width:100%;height:100%;
      display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
      padding:28px 22px;gap:10px;position:relative;
    }

    .pi-cap{width:100%;display:flex;flex-direction:column;gap:12px;align-items:flex-start;justify-content:center;}
    .pi-k{
      font-family:'Raleway',sans-serif;
      font-size:9px;letter-spacing:6px;text-transform:uppercase;
      color:rgba(90,72,48,0.42);
    }
    .pi-season{
      font-family:'Cormorant Garamond',serif;font-size:22px;
      font-weight:600;font-style:italic;text-align:left;
    }
    .pi-rule{width:64px;height:1px;margin:4px 0;}
    .pi-verse{
      font-family:'Cormorant Garamond',serif;font-size:14px;
      font-weight:300;font-style:italic;
      text-align:left;line-height:1.95;color:#5a4830;white-space:pre-line;
    }
    .pi-num{
      position:absolute;bottom:13px;
      font-family:'Raleway',sans-serif;font-size:9px;
      letter-spacing:3px;color:rgba(90,72,48,0.28);
    }

    .pi-img{
      position:absolute;inset:0;
      background:
        radial-gradient(900px 520px at 30% 18%, rgba(255,255,255,0.55), transparent 48%),
        linear-gradient(145deg, rgba(212,175,106,0.18) 0%, rgba(70,55,42,0.55) 100%);
    }
    .pi-img::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(to top right, rgba(0,0,0,0.14), transparent 55%, rgba(255,255,255,0.18));
      pointer-events:none;
    }
    .pi-img img{
      position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
      filter:saturate(1.06) contrast(1.03);
    }

    /* NAV */
    .rd-nav{display:flex;align-items:center;gap:30px;margin-top:22px;}
    .nav-btn{
      padding:10px 32px;border:1px solid rgba(0,0,0,0.10);
      background:rgba(255,255,255,0.22);
      color:rgba(35,25,14,0.68);
      font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:4px;
      cursor:pointer;transition:border-color .3s,color .3s, background .3s;
      backdrop-filter:blur(8px);
      border-radius:999px;
      touch-action:manipulation;
    }
    .nav-btn:hover{border-color:rgba(0,0,0,0.22);color:rgba(0,0,0,0.82);background:rgba(255,255,255,0.34);}
    .nav-btn.hid{visibility:hidden;}
    .nav-ind{
      font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;
      color:rgba(35,25,14,0.45);min-width:58px;text-align:center;
    }

    /* ═══════════════ S4: CASSETTE ═══════════════ */
    #s4{
      background:radial-gradient(ellipse at 50% 40%,#1c1006 0%,#0a0603 70%,#020202 100%);
      flex-direction:column;gap:0;
    }

    .cass-intro{
      font-family:'Cormorant Garamond',serif;font-size:23px;
      font-style:italic;font-weight:300;color:rgba(212,175,106,0.72);
      text-align:center;letter-spacing:2px;margin-bottom:38px;
      opacity:0;transform:translateY(18px);
    }
    .cass-intro.show{animation:riseIn 1.1s ease forwards;}

    .cass-body{cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:26px;touch-action:manipulation;}

    .tape{
      width:282px;height:174px;
      background:linear-gradient(148deg,#272114 0%,#1a1509 100%);
      border-radius:12px;border:2px solid #3c3220;
      position:relative;
      box-shadow:0 26px 65px rgba(0,0,0,0.72),inset 0 1px 0 rgba(255,255,255,0.04);
      animation:tpFloat 3.6s ease-in-out infinite;
    }
    @keyframes tpFloat{
      0%,100%{transform:translateY(0) rotate(-1.5deg);}
      50%{transform:translateY(-11px) rotate(-0.5deg);}
    }

    .tape-lbl{
      position:absolute;top:18px;left:18px;right:18px;height:70px;
      border-radius:5px;
      background:linear-gradient(140deg,#d4af6a 0%,#b88a38 45%,#d4af6a 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    }
    .tape-lbl-t{
      font-family:'Cormorant Garamond',serif;font-size:17px;
      font-style:italic;font-weight:700;color:#1a0d05;letter-spacing:1px;
    }
    .tape-lbl-s{
      font-family:'Raleway',sans-serif;font-size:8px;font-weight:400;
      letter-spacing:5px;color:rgba(26,13,5,0.52);text-transform:uppercase;
    }

    .tape-win{
      position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
      width:130px;height:38px;background:#0e0a06;border-radius:19px;
      display:flex;align-items:center;justify-content:space-around;padding:0 18px;
    }

    .reel{
      width:46px;height:46px;border-radius:50%;
      background:radial-gradient(circle at 38% 33%,#3c3020,#0e0a06);
      border:1.5px solid #2c2016;position:relative;
      animation:reelSpin 2.4s linear infinite;top:-4px;
    }
    .reel:last-child{animation-direction:reverse;}
    @keyframes reelSpin{to{transform:rotate(360deg);}}
    .reel::before{
      content:'';position:absolute;inset:6px;border-radius:50%;
      background:conic-gradient(#2c2016 0deg,#0e0a06 60deg,#2c2016 60deg,#0e0a06 120deg,#2c2016 120deg,#0e0a06 180deg,#2c2016 180deg,#0e0a06 240deg,#2c2016 240deg,#0e0a06 300deg,#2c2016 300deg,#0e0a06 360deg);
    }
    .reel::after{
      content:'';position:absolute;inset:12px;border-radius:50%;
      background:radial-gradient(circle,#2c2016 0%,#0e0a06 100%);
    }

    .tape-hint{
      font-family:'Raleway',sans-serif;font-size:10px;
      letter-spacing:5px;color:rgba(212,175,106,0.38);
      animation:breathe 2s ease-in-out infinite;
    }

    /* ═══════════════ S5: TV ═══════════════ */
    #s5{
      background:radial-gradient(ellipse at 50% 55%,#0b1307 0%,#050802 70%);
      flex-direction:column;gap:0;
    }

    .tv-wrap{position:relative;display:flex;flex-direction:column;align-items:center;}
    .tv-body{
      width:448px;height:346px;
      background:linear-gradient(150deg,#2a2820 0%,#1a1810 100%);
      border-radius:28px 28px 36px 36px;border:3px solid #363420;
      position:relative;
      box-shadow:0 34px 85px rgba(0,0,0,0.78),inset 0 2px 0 rgba(255,255,255,0.04);
    }

    .tv-ants{
      position:absolute;top:-68px;left:50%;transform:translateX(-50%);
      width:80px;height:64px;display:flex;justify-content:space-between;
    }
    .tv-ant{
      width:2.5px;height:62px;
      background:linear-gradient(180deg,#4c4a30,#2a2820);
      transform-origin:bottom center;border-radius:2px;
    }
    .tv-ant:first-child{transform:rotate(-24deg);}
    .tv-ant:last-child{transform:rotate(24deg);}

    .tv-bezel{
      position:absolute;top:22px;left:22px;right:88px;bottom:22px;
      background:#050705;border-radius:14px;overflow:hidden;
      box-shadow:inset 0 0 45px rgba(0,0,0,0.92),inset 0 0 0 2px rgba(0,0,0,0.6);
    }

    .tv-scr{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:12px;
    }
    .tv-scr-logo{
      font-family:'Cormorant Garamond',serif;font-style:italic;
      font-size:21px;color:rgba(110,235,130,0.82);letter-spacing:2px;
    }
    .tv-scr-sub{
      font-family:'Raleway',sans-serif;font-size:9px;
      letter-spacing:5px;color:rgba(110,235,130,0.4);
    }
    .tv-play{font-size:34px;opacity:0.45;color:rgba(110,235,130,0.8);}
    .tv-prog{
      width:68%;height:2px;
      background:rgba(110,235,130,0.1);border-radius:1px;overflow:hidden;margin-top:8px;
    }
    .tv-prog-b{height:100%;width:0%;background:rgba(110,235,130,0.62);border-radius:1px;transition:width .3s linear;}
    .tv-rec{
      font-family:'Raleway',sans-serif;font-size:10px;
      letter-spacing:3px;color:rgba(235,90,90,0.82);
      animation:blink 1.2s steps(1) infinite;
    }
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

    .tv-scan{
      position:absolute;inset:0;border-radius:14px;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent 0px,transparent 3px,rgba(0,0,0,0.045) 3px,rgba(0,0,0,0.045) 4px);
    }
    .tv-vig{
      position:absolute;inset:0;border-radius:14px;pointer-events:none;
      box-shadow:inset 0 0 55px rgba(0,0,0,0.55);
    }

    .tv-ctrl{
      position:absolute;right:16px;top:50%;transform:translateY(-50%);
      display:flex;flex-direction:column;gap:16px;align-items:center;
    }
    .tv-knob{
      width:26px;height:26px;border-radius:50%;
      background:radial-gradient(circle at 35% 30%,#4a4830,#181610);
      border:1.5px solid #2a2820;box-shadow:0 3px 7px rgba(0,0,0,0.65);
    }
    .tv-spk{
      width:22px;height:54px;border-radius:3px;
      background:#161410;border:1px solid #2a2820;
      display:flex;flex-direction:column;justify-content:space-around;padding:6px 3px;
    }
    .tv-spk-h{height:2px;background:#0a0906;border-radius:1px;}

    .tv-legs{display:flex;gap:132px;margin-top:-3px;}
    .tv-leg{
      width:18px;height:44px;
      background:linear-gradient(180deg,#2a2820,#181610);
      border-radius:0 0 5px 5px;border:2px solid #363420;border-top:none;
    }

    .tv-cap{
      font-family:'Cormorant Garamond',serif;font-style:italic;
      font-size:15px;color:rgba(212,175,106,0.45);
      letter-spacing:4px;margin-top:26px;
    }
  </style>
</head>
<body>
  <div id="ov"></div>

  <!-- ═══ S1: NIGHT SKY ═══ -->
  <div class="screen active" id="s1">
    <canvas id="c-stars"></canvas>
    <div class="sky-center">
      <div class="logo-mark">Memora &nbsp;·&nbsp; Premium</div>
      <div>
        <span class="type-line" id="hook-l1"></span>
        <span class="type-line" id="hook-l2"></span>
      </div>
      <div class="g-divider"></div>
      <div class="g-sub">✦ &nbsp; a premium memory album &nbsp; ✦</div>
      <button class="cta" id="btn-open" type="button">Open Album</button>
    </div>
  </div>

  <!-- ═══ S2: ALBUM ═══ -->
  <div class="screen" id="s2">
    <div class="album-scene" onclick="go(2,3,initReader)">
      <div class="book-3d">
        <div class="book-spine"></div>
        <div class="book-face">
          <svg class="bk-ornament" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="46" stroke="gold" stroke-width="0.4"/>
            <circle cx="50" cy="50" r="32" stroke="gold" stroke-width="0.3"/>
            <circle cx="50" cy="50" r="18" stroke="gold" stroke-width="0.22"/>
            <line x1="50" y1="4" x2="50" y2="96" stroke="gold" stroke-width="0.3"/>
            <line x1="4" y1="50" x2="96" y2="50" stroke="gold" stroke-width="0.3"/>
            <line x1="17" y1="17" x2="83" y2="83" stroke="gold" stroke-width="0.2"/>
            <line x1="83" y1="17" x2="17" y2="83" stroke="gold" stroke-width="0.2"/>
            <polygon points="50,8 53,18 48,18" fill="gold" opacity="0.45"/>
            <polygon points="50,92 53,82 48,82" fill="gold" opacity="0.45"/>
            <polygon points="8,50 18,47 18,53" fill="gold" opacity="0.45"/>
            <polygon points="92,50 82,47 82,53" fill="gold" opacity="0.45"/>
          </svg>
          <div class="bk-title">Memora</div>
          <div class="bk-sub">Premium Edition</div>
          <div class="bk-pulse">tap to open &nbsp;›</div>
        </div>
      </div>
      <div class="bk-glow"></div>
      <div class="s2-caption">a memory album · premium edition</div>
    </div>
  </div>

  <!-- ═══ S3: READER ═══ -->
  <div class="screen" id="s3">
    <div id="bg-rd"></div>
    <canvas id="c-pt"></canvas>
    <div class="rd-root">
      <div class="sn-hdr" id="sn-hdr">✦ Spring ✦</div>
      <div class="spread" id="spread">
        <div class="pg-l"><div class="pi" id="pi-l"></div></div>
        <div class="pg-r"><div class="pi" id="pi-r"></div></div>
        <div class="flip" id="flip">
          <div class="flip-f"><div class="pi" id="pi-ff"></div></div>
          <div class="flip-b"><div class="pi" id="pi-fb"></div></div>
        </div>
      </div>
      <div class="rd-nav">
        <button class="nav-btn hid" id="btn-prev" onclick="prevPage()">← Prev</button>
        <div class="nav-ind" id="nav-ind">1 / 6</div>
        <button class="nav-btn" id="btn-next" onclick="nextPage()">Next →</button>
      </div>
    </div>
  </div>

  <!-- ═══ S4: CASSETTE ═══ -->
  <div class="screen" id="s4">
    <div class="cass-intro" id="cass-intro">A melody just for you</div>
    <div class="cass-body" onclick="go(4,5,startTV)">
      <div class="tape">
        <div class="tape-lbl">
          <div class="tape-lbl-t">Memora Premium</div>
          <div class="tape-lbl-s">Side A &nbsp;·&nbsp; Memories</div>
        </div>
        <div class="tape-win">
          <div class="reel"></div>
          <div class="reel"></div>
        </div>
      </div>
      <div class="tape-hint">tap to play &nbsp;▶</div>
    </div>
  </div>

  <!-- ═══ S5: TV ═══ -->
  <div class="screen" id="s5">
    <div class="tv-wrap">
      <div class="tv-body">
        <div class="tv-ants"><div class="tv-ant"></div><div class="tv-ant"></div></div>
        <div class="tv-bezel">
          <div class="tv-scr" id="tv-scr">
            <div class="tv-play">▶</div>
            <div class="tv-scr-logo">Memora Premium</div>
            <div class="tv-scr-sub">best moments · memora</div>
          </div>
          <div class="tv-scan"></div>
          <div class="tv-vig"></div>
        </div>
        <div class="tv-ctrl">
          <div class="tv-knob"></div>
          <div class="tv-knob"></div>
          <div class="tv-spk">
            <div class="tv-spk-h"></div><div class="tv-spk-h"></div>
            <div class="tv-spk-h"></div><div class="tv-spk-h"></div>
            <div class="tv-spk-h"></div>
          </div>
          <div class="tv-knob"></div>
        </div>
      </div>
      <div class="tv-legs"><div class="tv-leg"></div><div class="tv-leg"></div></div>
      <div class="tv-cap">best moments &nbsp;·&nbsp; memora</div>
    </div>
  </div>

  <script>
    /* ============================
       S1: Stars + diagonal meteors
       ============================ */
    const sc=document.getElementById('c-stars'),sx=sc.getContext('2d');
    let W,H,stars=[],meteors=[],lastM=0;

    function initStars(){
      W=sc.width=window.innerWidth; H=sc.height=window.innerHeight;
      stars=Array.from({length:220},()=>({
        x:Math.random()*W,y:Math.random()*H,
        r:Math.random()*1.4+0.3,
        phase:Math.random()*Math.PI*2,
        speed:0.0008+Math.random()*0.0016,
        gold:Math.random()<0.12
      }));
    }

    function spawnMeteor(){
      meteors.push({
        x:W*0.08+Math.random()*W*0.5,
        y:H*0.04+Math.random()*H*0.28,
        len:90+Math.random()*140,
        spd:7+Math.random()*6,
        ang:0.71+(Math.random()-.5)*0.26,
        prog:0,a:1
      });
    }

    function drawStars(t){
      sx.clearRect(0,0,W,H);
      stars.forEach(s=>{
        const a=0.22+0.78*(0.5+0.5*Math.sin(t*s.speed*1000+s.phase));
        sx.beginPath();sx.arc(s.x,s.y,s.r,0,Math.PI*2);
        sx.fillStyle=s.gold?`rgba(212,175,106,${a*.7})`:`rgba(255,255,255,${a})`;
        sx.fill();
      });
      meteors.forEach((m,i)=>{
        m.prog+=m.spd;
        const tx=m.x+Math.cos(m.ang)*m.prog;
        const ty=m.y+Math.sin(m.ang)*m.prog;
        const bx=m.x+Math.cos(m.ang)*Math.max(0,m.prog-m.len);
        const by=m.y+Math.sin(m.ang)*Math.max(0,m.prog-m.len);
        m.a=Math.max(0,1-m.prog/(m.len+210));
        const g=sx.createLinearGradient(bx,by,tx,ty);
        g.addColorStop(0,'rgba(255,255,240,0)');
        g.addColorStop(1,`rgba(255,252,220,${Math.min(1,m.a*1.15)})`);
        sx.beginPath();sx.moveTo(bx,by);sx.lineTo(tx,ty);
        sx.strokeStyle=g;sx.lineWidth=1.9;
        sx.shadowColor='rgba(212,175,106,0.18)';sx.shadowBlur=10;
        sx.stroke();
        sx.shadowBlur=0;
        if(m.a<=0)meteors.splice(i,1);
      });
    }

    function animStars(ts){
      drawStars(ts/1000);
      // Cinematic pacing: fewer meteors, more readable.
      if(ts-lastM>3200+Math.random()*3400){spawnMeteor();lastM=ts;}
      requestAnimationFrame(animStars);
    }
    initStars();requestAnimationFrame(animStars);
    window.addEventListener('resize',initStars);

    /* ============================
       Screen transitions
       ============================ */
    const ov=document.getElementById('ov');
    function go(from,to,cb){
      ov.classList.add('on');
      setTimeout(()=>{
        document.getElementById('s'+from).classList.remove('active');
        document.getElementById('s'+to).classList.add('active');
        if(cb)cb();
        setTimeout(()=>ov.classList.remove('on'),80);
      },680);
    }

    /* ============================
       S1: Typing effect + soft key-tap (Web Audio)
       ============================ */
    const hookL1=document.getElementById('hook-l1');
    const hookL2=document.getElementById('hook-l2');
    const HOOK_LINES=[
      "Every memory is a star—",
      "forever bright in the sky of your heart."
    ];

    const audio=(()=>{
      let ctx=null;
      let last=0;
      function ensure(){
        if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
        return ctx;
      }
      function tap(intensity=0.7){
        const c=ensure();
        const now=c.currentTime;
        if(now-last<0.012) return;
        last=now;
        const o1=c.createOscillator();
        const o2=c.createOscillator();
        const g=c.createGain();
        const hp=c.createBiquadFilter();
        o1.type='triangle';
        o2.type='sine';
        o1.frequency.value=560+Math.random()*140;
        o2.frequency.value=220+Math.random()*80;
        hp.type='highpass';
        hp.frequency.value=260;
        g.gain.value=0.0001;
        o1.connect(g);o2.connect(g);g.connect(hp);hp.connect(c.destination);
        const a=Math.max(0.02,Math.min(0.10,0.07*intensity));
        g.gain.exponentialRampToValueAtTime(a, now+0.008);
        g.gain.exponentialRampToValueAtTime(0.0001, now+0.055);
        o1.start(now);o2.start(now);
        o1.stop(now+0.06);o2.stop(now+0.06);
      }
      return { ensure, tap };
    })();

    function setTyping(el){
      el.innerHTML='';
      const span=document.createElement('span');
      const caret=document.createElement('span');
      caret.className='caret';
      el.appendChild(span);
      el.appendChild(caret);
      return span;
    }

    async function typeLine(el, text, delay=40){
      const span=setTyping(el);
      for(let i=0;i<text.length;i++){
        const ch=text[i];
        span.textContent+=ch;
        if(ch.trim()) audio.tap(0.55+Math.random()*0.35);
        let d=delay*(1+(Math.random()*0.14-0.07));
        if(ch===','||ch==='—') d*=2.0;
        if(ch==='.'||ch==='!'||ch==='?') d*=2.8;
        // eslint-disable-next-line no-await-in-loop
        await new Promise(r=>setTimeout(r,d));
      }
    }

    async function runHook(){
      await new Promise(r=>setTimeout(r,850));
      await typeLine(hookL1, HOOK_LINES[0], 40);
      await new Promise(r=>setTimeout(r,220));
      await typeLine(hookL2, HOOK_LINES[1], 40);
    }

    /* ============================
       S3: Reader spreads (6 photos)
       Spring ×2, Summer ×1, Autumn ×2, Winter ×1
       One side = caption, one side = image
       ============================ */
    const SPREADS=[
      { hdr:'✦ Spring ✦',hc:'rgba(220,140,168,0.88)',pt:'spring',bg:'radial-gradient(ellipse at 50% 30%,#fff7f0 0%,#f7eadc 42%,#ead5c0 100%)',title:'Cherry blossoms begin to speak',verse:'Cherry blossoms drift—\nsoft as promises kept.\nWe look up, and the sky remembers.' },
      { hdr:'✦ Spring ✦',hc:'rgba(220,140,168,0.88)',pt:'spring',bg:'radial-gradient(ellipse at 50% 28%,#fff7f0 0%,#f7eadc 42%,#ead5c0 100%)',title:'A gentle afternoon, held forever',verse:'Warm light slips through quiet hours.\nYour laughter stays—\na ribbon tied to time.' },
      { hdr:'✦ Summer ✦',hc:'rgba(240,200,80,0.88)',pt:'summer',bg:'radial-gradient(ellipse at 50% 30%,#fff7e8 0%,#f7e7cf 44%,#e8d1ad 100%)',title:'Golden hour, unhurried',verse:'Fireflies rise like punctuation—\nbright commas in a warm dusk.\nThe world listens when you smile.' },
      { hdr:'✦ Autumn ✦',hc:'rgba(240,148,76,0.88)',pt:'autumn',bg:'radial-gradient(ellipse at 50% 26%,#fff5eb 0%,#f6e1cc 44%,#e7c6a6 100%)',title:'Leaves turn—so do pages',verse:'Maple leaves fall slowly,\nlike stories choosing their own ending.\nEven farewell can be tender.' },
      { hdr:'✦ Autumn ✦',hc:'rgba(240,148,76,0.88)',pt:'autumn',bg:'radial-gradient(ellipse at 50% 26%,#fff5eb 0%,#f6e1cc 44%,#e7c6a6 100%)',title:'Amber keeps the warmth',verse:'In amber light,\nmemories glow without asking.\nWhat matters stays—quietly.' },
      { hdr:'✦ Winter ✦',hc:'rgba(140,200,255,0.88)',pt:'winter',bg:'radial-gradient(ellipse at 50% 28%,#f3f8ff 0%,#e3eefb 44%,#d4e4f6 100%)',title:'Snow hushes the world',verse:'Snow falls in silver hush.\nYour heart is a lantern—\nand love becomes the light.' },
    ];

    // Fill these with your real image URLs + captions.
    // Example:
    // ALBUM_PHOTOS[0] = { src: "https://.../photo1.jpg", caption: "..." }
    const ALBUM_PHOTOS=Array.from({length:6},(_,i)=>({ src:'', caption:`A memory, softly framed. (${i+1})` }));

    let cur=0,flipping=false;

    function captionHTML(s, idx){
      const cap=(ALBUM_PHOTOS[idx] && ALBUM_PHOTOS[idx].caption) ? ALBUM_PHOTOS[idx].caption : '';
      const seasonName=s.hdr.replace(/✦/g,'').trim();
      return `
        <div class="pi-cap">
          <div class="pi-k">${seasonName} · Page ${idx+1}</div>
          <div class="pi-season">${s.title}</div>
          <div class="pi-rule" style="background:linear-gradient(90deg,transparent,${s.hc}80,transparent)"></div>
          <div class="pi-verse">${cap ? cap + "\\n\\n" : ""}${s.verse}</div>
          <div class="pi-num">${idx+1}</div>
        </div>
      `;
    }

    function imageHTML(s, idx){
      const src=(ALBUM_PHOTOS[idx] && ALBUM_PHOTOS[idx].src) ? ALBUM_PHOTOS[idx].src : '';
      const tint=`radial-gradient(900px 520px at 30% 18%, rgba(255,255,255,0.55), transparent 48%), linear-gradient(145deg, ${s.hc}22 0%, rgba(70,55,42,0.55) 100%)`;
      return `
        <div class="pi-img" style="background:${tint}">
          ${src ? `<img src="${src}" alt="" loading="eager" decoding="async">` : ``}
        </div>
      `;
    }

    function renderPage(){
      const s=SPREADS[cur];
      document.getElementById('bg-rd').style.background=s.bg;
      const hdr=document.getElementById('sn-hdr');
      hdr.textContent=s.hdr;hdr.style.color=s.hc;

      // Left: caption, Right: image
      document.getElementById('pi-l').innerHTML=captionHTML(s, cur);
      document.getElementById('pi-r').innerHTML=imageHTML(s, cur);

      // Flip front: current right (image). Flip back: next left (caption), or end card.
      document.getElementById('pi-ff').innerHTML=imageHTML(s, cur);

      if(cur+1<SPREADS.length){
        const ns=SPREADS[cur+1];
        document.getElementById('pi-fb').innerHTML=captionHTML(ns, cur+1);
      }else{
        document.getElementById('pi-fb').innerHTML=`
          <div class="pi-cap">
            <div class="pi-k">Finish</div>
            <div class="pi-season" style="color:#8a7040">Echo</div>
            <div class="pi-rule" style="background:linear-gradient(90deg,transparent,#8a704080,transparent)"></div>
            <div class="pi-verse">Thank you for turning each page.\nEvery image is a small eternity.\nEvery caption, a heartbeat kept.</div>
            <div class="pi-num">fin</div>
          </div>`;
      }

      document.getElementById('flip').classList.remove('open');
      document.getElementById('nav-ind').textContent=`${cur+1} / ${SPREADS.length}`;
      document.getElementById('btn-prev').classList.toggle('hid',cur===0);
      const nb=document.getElementById('btn-next');
      nb.textContent=cur<SPREADS.length-1?'Next →':'Finish ✦';
      startParticles(s.pt);
    }

    function initReader(){cur=0;renderPage();}

    function nextPage(){
      if(flipping)return;flipping=true;
      document.getElementById('flip').classList.add('open');
      setTimeout(()=>{
        if(cur<SPREADS.length-1){cur++;renderPage();flipping=false;}
        else{go(3,4,showCassette);flipping=false;}
      },1350);
    }

    function prevPage(){
      if(flipping||cur===0)return;
      cur--;flipping=true;
      renderPage();
      document.getElementById('flip').classList.add('open');
      setTimeout(()=>{document.getElementById('flip').classList.remove('open');flipping=false;},60);
    }

    /* ============================
       S3: Canvas particles (kept)
       ============================ */
    const pc=document.getElementById('c-pt'),px=pc.getContext('2d');
    let ptcls=[],ptType='spring',ptRaf;

    function startParticles(type){
      ptType=type;
      pc.width=window.innerWidth;pc.height=window.innerHeight;
      if(ptRaf)cancelAnimationFrame(ptRaf);
      const cnt={spring:28,summer:16,autumn:34,winter:48}[type]||25;
      ptcls=Array.from({length:cnt},()=>mkPt(true));
      loopPt();
    }

    function mkPt(init){
      const C={
        spring:{cols:['#ffb7c5','#ff8fab','#ffd1dc','#ffaec9'],sz:[4,11],spd:[0.5,1.4]},
        summer:{cols:['#ffd700','#ffec6e','#ffe082','#fff59d'],sz:[2,5],spd:[0.2,0.7]},
        autumn:{cols:['#d4541a','#e8801a','#f4a93a','#c04010','#8b3a10'],sz:[6,15],spd:[0.7,1.9]},
        winter:{cols:['#e0f0ff','#c4d8f0','#ffffff','#b0ccee'],sz:[2,5],spd:[0.3,0.9]}
      };
      const c=C[ptType];
      return{
        x:Math.random()*pc.width,
        y:init?Math.random()*pc.height:-20,
        sz:c.sz[0]+Math.random()*(c.sz[1]-c.sz[0]),
        col:c.cols[Math.floor(Math.random()*c.cols.length)],
        spd:c.spd[0]+Math.random()*(c.spd[1]-c.spd[0]),
        drift:(Math.random()-.5)*0.6,rot:Math.random()*Math.PI*2,
        rs:(Math.random()-.5)*0.04,wp:Math.random()*Math.PI*2,
        op:0.5+Math.random()*0.5
      };
    }

    function drawPt(p){
      px.save();px.translate(p.x,p.y);px.rotate(p.rot);px.globalAlpha=p.op;
      if(ptType==='spring'){
        px.fillStyle=p.col;px.beginPath();
        px.ellipse(0,0,p.sz*.45,p.sz,0,0,Math.PI*2);px.fill();
      }else if(ptType==='autumn'){
        px.fillStyle=p.col;px.beginPath();
        px.moveTo(0,-p.sz/2);
        px.bezierCurveTo(p.sz/2,-p.sz/4,p.sz/2,p.sz/4,0,p.sz/2);
        px.bezierCurveTo(-p.sz/2,p.sz/4,-p.sz/2,-p.sz/4,0,-p.sz/2);
        px.fill();
        px.strokeStyle=p.col+'aa';px.lineWidth=0.5;
        px.beginPath();px.moveTo(0,-p.sz/2);px.lineTo(0,p.sz/2);px.stroke();
      }else if(ptType==='winter'){
        px.strokeStyle=p.col;px.lineWidth=0.9;
        for(let a=0;a<6;a++){
          px.save();px.rotate(a*Math.PI/3);
          px.beginPath();px.moveTo(0,0);px.lineTo(0,p.sz);px.stroke();
          px.restore();
        }
      }else{
        px.fillStyle=p.col;px.beginPath();
        px.arc(0,0,p.sz/2,0,Math.PI*2);px.fill();
      }
      px.restore();
    }

    function loopPt(){
      px.clearRect(0,0,pc.width,pc.height);
      const t=Date.now()*.001;
      ptcls.forEach((p,i)=>{
        p.y+=p.spd;
        p.x+=p.drift+(ptType!=='summer'?Math.sin(t+p.wp)*.4:0);
        p.rot+=p.rs;
        if(p.y>pc.height+22)ptcls[i]=mkPt(false);
        drawPt(p);
      });
      ptRaf=requestAnimationFrame(loopPt);
    }

    /* ============================
       S4 / S5: Cassette + TV
       ============================ */
    function showCassette(){
      setTimeout(()=>{
        const el=document.getElementById('cass-intro');
        el.classList.add('show');
      },280);
    }

    function startTV(){
      const scr=document.getElementById('tv-scr');
      setTimeout(()=>{
        scr.innerHTML=`
          <div class="tv-rec">● REC</div>
          <div class="tv-scr-logo">Memora Premium</div>
          <div class="tv-scr-sub">playing memories...</div>
          <div class="tv-prog"><div class="tv-prog-b" id="tv-pb"></div></div>`;
        let pct=0;
        const iv=setInterval(()=>{
          pct=Math.min(100,pct+0.8);
          const pb=document.getElementById('tv-pb');
          if(pb)pb.style.width=pct+'%';
          if(pct>=100)clearInterval(iv);
        },55);
      },600);
    }

    /* ============================
       Hook wiring
       ============================ */
    document.getElementById('btn-open').addEventListener('click', ()=>{
      audio.ensure();
      go(1,2);
    });
    runHook();
  </script>
</body>
</html>
